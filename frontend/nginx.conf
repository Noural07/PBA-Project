server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-style fallback til index.html. AlertFeed er en single-page-app
    # uden router, men reglen er bevaret for at undgå 404 ved direkte adgang.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html så build-time-indlejret VITE_ALERTING_BASE_URL
    # altid afspejler det aktuelle deployment.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires 0;
    }
}
