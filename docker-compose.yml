# ----------------------------------------------------------------------------
# Lokalt udviklingsmiljø for det event-drevne Trendlog-system (Fase 1).
# Spinner samtlige microservices op sammen med deres infrastrukturelle
# afhængigheder samt en komplet observabilitets-stack (Loki, Grafana, Gatus).
# ----------------------------------------------------------------------------

name: pba-trendlog

services:
  # ---------------------------------------------------------------------------
  # Infrastruktur
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pba-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 6
    networks: [pba-net]

  postgres:
    image: postgres:16-alpine
    container_name: pba-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # POSTGRES_DB peger på en "bootstrap"-database der ikke bruges af
      # nogen microservice. De rigtige per-service-databaser (pba_analyzer,
      # pba_alerting) oprettes idempotent af init-scriptet nedenfor jf.
      # Database-per-Service-mønsteret.
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Postgres-imaget eksekverer automatisk *.sql/*.sh-filer fra denne
      # mappe ved første volumen-initialisering. Bruges til at oprette
      # separate logiske databaser pr. bounded context.
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [pba-net]

  loki:
    image: grafana/loki:3.1.0
    container_name: pba-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks: [pba-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pba-grafana
    depends_on:
      loki:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks: [pba-net]

  # Lille engangs-container der blokerer Gatus' opstart i 60 sekunder, så de
  # første polling-kald rammer microservicene EFTER de er færdige med JIT,
  # konfigurationsindlæsning og første GC-cyklus. Derved undgås de "røde
  # pletter" i Gatus' historik-strip, som ellers vises under cold start.
  # Mønstret bruger Compose v2's "service_completed_successfully" condition.
  gatus-startup-delay:
    image: busybox:1.36
    container_name: pba-gatus-delay
    command: ["sh", "-c", "echo 'Waiting ${GATUS_STARTUP_DELAY_SECONDS:-60}s before starting Gatus...' && sleep ${GATUS_STARTUP_DELAY_SECONDS:-60}"]
    depends_on:
      api-gateway:        { condition: service_started }
      ingestion-service:  { condition: service_started }
      analyzer-service:   { condition: service_started }
      ai-service:         { condition: service_started }
      alerting-service:   { condition: service_started }
    restart: "no"
    networks: [pba-net]

  gatus:
    image: twinproduction/gatus:v5.13.1
    container_name: pba-gatus
    depends_on:
      gatus-startup-delay:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
    environment:
      GATUS_CONFIG_PATH: /config/config.yaml
    networks: [pba-net]

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------
  # ApiGateway, IngestionService og AiService persisterer ikke noget i
  # Postgres og har derfor ingen ConnectionStrings__Postgres-variabel —
  # deres /health-readiness-check pinger ikke databasen (jf.
  # HealthChecksRegistration.AddPlatformHealthChecks(requirePostgres:
  # false)). Dette understreger Database-per-Service-mønsteret: kun de
  # tjenester der reelt har et datalag, har en kobling til DB-clusteret.
  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: pba-api-gateway
    depends_on:
      rabbitmq:  { condition: service_healthy }
      loki:      { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Loki__Url: http://loki:3100
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__User: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5000:8080"
    networks: [pba-net]

  ingestion-service:
    build:
      context: .
      dockerfile: src/IngestionService/Dockerfile
    container_name: pba-ingestion
    depends_on:
      rabbitmq:  { condition: service_healthy }
      loki:      { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Loki__Url: http://loki:3100
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__User: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      TRENDLOG_API_KEY: ${TRENDLOG_API_KEY}
      Trendlog__BaseUrl: ${TRENDLOG_BASE_URL}
    ports:
      - "5101:8080"
    networks: [pba-net]

  analyzer-service:
    build:
      context: .
      dockerfile: src/AnalyzerService/Dockerfile
    container_name: pba-analyzer
    depends_on:
      rabbitmq:  { condition: service_healthy }
      postgres:  { condition: service_healthy }
      loki:      { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Loki__Url: http://loki:3100
      # Database-per-Service: AnalyzerService ejer pba_analyzer-skemaet.
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pba_analyzer;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__User: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5102:8080"
    networks: [pba-net]

  ai-service:
    build:
      context: .
      dockerfile: src/AiService/Dockerfile
    container_name: pba-ai
    depends_on:
      rabbitmq:  { condition: service_healthy }
      loki:      { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Loki__Url: http://loki:3100
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__User: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      Gemini__BaseUrl: ${GEMINI_BASE_URL}
      Gemini__Model: ${GEMINI_MODEL}
    ports:
      - "5103:8080"
    networks: [pba-net]

  alerting-service:
    build:
      context: .
      dockerfile: src/AlertingService/Dockerfile
    container_name: pba-alerting
    depends_on:
      rabbitmq:  { condition: service_healthy }
      postgres:  { condition: service_healthy }
      loki:      { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Loki__Url: http://loki:3100
      # Database-per-Service: AlertingService ejer pba_alerting-skemaet.
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pba_alerting;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__User: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      ALERTING_FRONTEND_ORIGIN: ${ALERTING_FRONTEND_ORIGIN}
    ports:
      - "5104:8080"
    networks: [pba-net]

  # ---------------------------------------------------------------------------
  # Phase 4 – AlertFeed frontend (React + TypeScript + Vite, serveret af Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ALERTING_BASE_URL: ${VITE_ALERTING_BASE_URL}
    container_name: pba-frontend
    depends_on:
      alerting-service: { condition: service_started }
    ports:
      - "5173:80"
    networks: [pba-net]

# ----------------------------------------------------------------------------
networks:
  pba-net:
    driver: bridge

volumes:
  rabbitmq-data:
  postgres-data:
  loki-data:
  grafana-data:
